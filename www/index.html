<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#714B67">
  <title>Odoo Mobile</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

<!-- ========== LOGIN SCREEN ========== -->
<div id="loginScreen" class="login-screen">

  <div class="offline-badge" id="offlineBadge">
    <span class="offline-dot"></span>
    Đang ngoại tuyến
  </div>

  <div class="login-card">
    <div class="login-logo">
      <!-- Odoo logo SVG inline -->
      <svg width="80" height="80" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="100" height="100" rx="20" fill="#714B67"/>
        <circle cx="50" cy="50" r="24" fill="white"/>
        <circle cx="50" cy="50" r="14" fill="#714B67"/>
        <circle cx="50" cy="50" r="6" fill="white"/>
      </svg>
      <h1>Odoo Mobile</h1>
      <p>Đăng nhập vào hệ thống của bạn</p>
    </div>

    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label for="serverUrl">Địa chỉ Server</label>
        <input
          type="url"
          id="serverUrl"
          name="serverUrl"
          placeholder="https://mycompany.odoo.com"
          autocomplete="url"
          inputmode="url"
        >
        <div class="server-hint">Ví dụ: https://erp.congty.vn</div>
      </div>

      <div class="form-group">
        <label for="database">Tên Database</label>
        <input
          type="text"
          id="database"
          name="database"
          placeholder="my_database"
          autocomplete="organization"
        >
      </div>

      <div class="form-group">
        <label for="username">Email / Tên đăng nhập</label>
        <input
          type="email"
          id="username"
          name="username"
          placeholder="admin@congty.vn"
          autocomplete="username"
          inputmode="email"
        >
      </div>

      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
        >
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <button type="submit" class="btn-login" id="loginBtn">
        <div class="spinner"></div>
        <span class="btn-text">Đăng nhập</span>
      </button>
    </form>
  </div>
</div>

<!-- ========== WEBVIEW SCREEN ========== -->
<div id="webviewScreen" class="webview-screen hidden">

  <div class="app-header">
    <div class="header-left">
      <svg width="28" height="28" viewBox="0 0 100 100" fill="none">
        <rect width="100" height="100" rx="20" fill="rgba(255,255,255,0.2)"/>
        <circle cx="50" cy="50" r="24" fill="white"/>
        <circle cx="50" cy="50" r="14" fill="#714B67"/>
        <circle cx="50" cy="50" r="6" fill="white"/>
      </svg>
      <h2 id="headerTitle">Odoo</h2>
    </div>
    <div class="header-right">
      <div class="network-status" id="networkDot" title="Kết nối"></div>
      <button class="header-btn" id="refreshBtn" title="Tải lại">↻</button>
      <button class="header-btn" id="logoutBtn" title="Đăng xuất">Thoát</button>
    </div>
  </div>

  <div class="odoo-frame-container">
    <!-- Loading overlay -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-spinner"></div>
      <div class="loading-text">Đang tải Odoo...</div>
    </div>

    <!-- Offline page -->
    <div class="offline-page hidden" id="offlinePage">
      <div class="offline-icon">📡</div>
      <h2>Không có kết nối mạng</h2>
      <p>Kiểm tra lại kết nối Wi-Fi hoặc dữ liệu di động của bạn.</p>
      <button class="btn-retry" id="retryBtn">Thử lại</button>
    </div>

    <!-- Odoo iframe -->
    <iframe
      id="odooFrame"
      title="Odoo"
      allow="camera; microphone; geolocation"
      allowfullscreen
    ></iframe>
  </div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<!-- Scripts -->
<script src="js/auth.js"></script>
<script src="js/push.js"></script>
<script src="js/app.js"></script>
</body>
</html>
