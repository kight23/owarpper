<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#714B67">
  <title>Odoo Mobile</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="login-container" class="login-screen">
  <div class="offline-badge" id="offlineBadge">
    <span class="offline-dot"></span>
    Đang ngoại tuyến
  </div>

  <div class="login-card">
    <div class="login-logo">
      <svg width="72" height="72" viewBox="0 0 100 100" fill="none">
        <rect width="100" height="100" rx="22" fill="#714B67"/>
        <circle cx="50" cy="50" r="24" fill="white"/>
        <circle cx="50" cy="50" r="14" fill="#714B67"/>
        <circle cx="50" cy="50" r="6" fill="white"/>
      </svg>
      <h1>Odoo Mobile</h1>
      <p>Đăng nhập vào hệ thống</p>
    </div>

    <form id="loginForm" autocomplete="on" novalidate>
      <div class="form-group">
        <label for="serverUrl">Địa chỉ Server</label>
        <input id="serverUrl" type="url" inputmode="url"
          placeholder="http://192.168.4.23:8069"
          autocomplete="url">
      </div>

      <div class="form-group">
        <label for="database">Database</label>
        <input id="database" type="text"
          placeholder="my_database"
          autocomplete="off">
      </div>

      <div class="form-group">
        <label for="username">Email / Tên đăng nhập</label>
        <input id="username" type="email" inputmode="email"
          placeholder="admin@congty.vn"
          autocomplete="username">
      </div>

      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input id="password" type="password"
          placeholder="••••••••"
          autocomplete="current-password">
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <button type="submit" class="btn-login" id="loginBtn">
        <div class="spinner"></div>
        <span class="btn-text">Đăng nhập</span>
      </button>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/auth.js"></script>
<script src="js/app.js"></script>
</body>
</html>
